<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnalyticsPro | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-body {
            background: linear-gradient(135deg, #dbe7ff 0%, #cddfff 52%, #bfd6ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 700;
            color: #4f46e5;
        }
        .logo span { color: #8c6cc4; }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h2 {
            font-size: 26px;
            margin: 0;
            color: #1e2937;
        }
        .auth-header p {
            color: #64748b;
            margin-top: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #334155;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .password-wrap {
            position: relative;
        }
        .password-wrap input {
            padding-right: 48px;
        }
        .toggle-password-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-password-btn:hover {
            background: #eef2ff;
            color: #4f46e5;
        }
        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: -8px;
            margin-bottom: 20px;
            gap: 10px;
        }
        .remember-me {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #334155;
            font-size: 14px;
            font-weight: 500;
            user-select: none;
        }
        .remember-me input {
            width: 16px;
            height: 16px;
            accent-color: #4f46e5;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        .forgot-password {
            text-align: right;
            margin: 0;
        }
        .forgot-password a {
            color: #4f46e5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .forgot-password a:hover {
            text-decoration: underline;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #938fd3, #7c3aed);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }
        .error-message {
            color: #ef4444;
            text-align: center;
            margin: 15px 0;
            font-size: 14px;
        }
        .success-message {
            color: #16a34a;
            text-align: center;
            margin: 15px 0;
            font-size: 14px;
        }
        .divider {
            text-align: center;
            margin: 25px 0;
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="logo">Analytics<span>Pro</span></div>

        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Sign in to continue to your dashboard</p>
        </div>

        <form id="auth-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="auth-email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="password-wrap">
                    <input type="password" id="auth-password" placeholder="Password" required>
                    <button type="button" id="toggle-password" class="toggle-password-btn" aria-label="Show password" title="Show password">
                        <svg id="password-eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M1 12C2.8 8 6.2 5 12 5C17.8 5 21.2 8 23 12C21.2 16 17.8 19 12 19C6.2 19 2.8 16 1 12Z" stroke="currentColor" stroke-width="2"/>
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="remember-row">
                <label class="remember-me" for="remember-me">
                    <input type="checkbox" id="remember-me" checked>
                    <span>Remember me</span>
                </label>
                <div class="forgot-password" id="forgot-container">
                    <a href="#" id="forgot-password-link">Forgot Password?</a>
                </div>
            </div>

            <div id="auth-success" class="success-message"></div>
            <div id="auth-error" class="error-message"></div>

            <button type="submit" id="auth-submit" class="btn">Sign In</button>
        </form>

        <div class="divider">or</div>

        <p style="text-align:center; color:#64748b; font-size:14px;">
            New here? <a href="register.html" style="color:#4f46e5; font-weight:600;">Create a new account</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
