version: '3.8'
services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=sqlite:///personal_analytics.db
      - SECRET_KEY=change-me
    volumes:
      - .:/app
  # Example postgres service for production testing (optional)
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: personal_analytics
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
